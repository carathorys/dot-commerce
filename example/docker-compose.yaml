services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: dot_commerce
      POSTGRES_PASSWORD: dot_commerce
      POSTGRES_DB: dot-commerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dot_commerce -d dot-commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db:5432;Database=dot-commerce;Username=dot_commerce;Password=dot_commerce"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
